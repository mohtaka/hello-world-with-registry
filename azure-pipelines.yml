# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '26bea31a-8357-4b8b-a7c2-6a6755391dfc'
  imageRepository: 'mohtakahelloworldwithregistry'
  containerRegistry: 'bpohelloapptest0324-fug8gwgfdyatcneq.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

- stage: Deploy
  displayName: Deploy to App Service
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Deploy
    displayName: Deploy Job
    environment: 'Production' # 先ほど作成したEnvironment名
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Azure App Serviceへのデプロイ実行'
            inputs:
              azureSubscription: 'Azure-Subscription-Connection' # あなたが作成した接続名
              appName: 'bpo-hello-app-test-0324' # Azure Portalで確認した名前
              imageName: '$(containerRegistry)/$(imageRepository):$(tag)'
